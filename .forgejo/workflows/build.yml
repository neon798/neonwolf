name: Build Neonwolf

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  NEONWOLF_VERSION: "129.0"
  NEONWOLF_RELEASE: "1"

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-24.04]
        arch: [x86_64]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf2.13 \
            build-essential \
            cargo \
            ccache \
            clang \
            cmake \
            libasound2-dev \
            libdbus-1-dev \
            libgtk-3-dev \
            libpulse-dev \
            libx11-dev \
            libx11-xcb-dev \
            libxcb-shm0-dev \
            libxcb1-dev \
            libxext-dev \
            libxkbcommon-dev \
            libxrandr-dev \
            mesa-common-dev \
            nasm \
            ninja-build \
            nodejs \
            npm \
            python3 \
            python3-pip \
            python3-setuptools \
            rustc \
            yasm \
            libavcodec-dev \
            libavutil-dev \
            libswresample-dev \
            libclang-dev \
            llvm-dev

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ${{ runner.os }}-ccache-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-ccache-

      - name: Fetch Firefox source
        run: make fetch

      - name: Apply Neonwolf patches
        run: make dir

      - name: Bootstrap build
        run: |
          cd neonwolf-${{ env.NEONWOLF_VERSION }}-${{ env.NEONWOLF_RELEASE }}
          ./mach --no-interactive bootstrap --application-choice=browser
        env:
          MOZBUILD_STATE_PATH: ~/.mozbuild

      - name: Build Neonwolf
        run: |
          cd neonwolf-${{ env.NEONWOLF_VERSION }}-${{ env.NEONWOLF_RELEASE }}
          ./mach build
        env:
          MOZBUILD_STATE_PATH: ~/.mozbuild
          SCCACHE: "0"

      - name: Package
        run: |
          cd neonwolf-${{ env.NEONWOLF_VERSION }}-${{ env.NEONWOLF_RELEASE }}
          cat browser/locales/shipped-locales | xargs ./mach package-multi-locale --locales

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: neonwolf-${{ env.NEONWOLF_VERSION }}-${{ env.NEONWOLF_RELEASE }}-${{ matrix.os }}-${{ matrix.arch }}
          path: neonwolf-${{ env.NEONWOLF_VERSION }}-${{ env.NEONWOLF_RELEASE }}/obj-*/dist/
          retention-days: 14
