<script src="chrome://browser/content/preferences/librewolf.js"/>

<html:template id="template-paneLibrewolf">

<hbox class="subcategory" hidden="true" data-category="paneLibrewolf">
  <html:h1 data-l10n-id="librewolf-header"/>
</hbox>

<html:setting-group groupid="librewolfBehavior" data-category="paneLibrewolf" hidden="true"/>
<html:setting-group groupid="librewolfNetworking" style="padding-top: 25px;" data-category="paneLibrewolf" hidden="true"/>
<html:setting-group groupid="librewolfPrivacy" style="padding-top: 25px;" data-category="paneLibrewolf" hidden="true"/>
<html:setting-group groupid="librewolfFingerprinting" style="padding-top: 25px;" data-category="paneLibrewolf" hidden="true"/>

<hbox class="subcategory" hidden="true" data-category="paneLibrewolf" style="margin-top: 25px">
    <html:h1>Shields &amp; updates</html:h1>
</hbox>

<groupbox data-category="paneLibrewolf" hidden="true">
  <label class="neonwolf-settings-heading">Ad &amp; tracker blocking</label>
  <checkbox id="neonwolf-pref-ads"
            label="Block ads and trackers with the native uBlock Origin engine"/>

  <label class="neonwolf-settings-heading">Filter lists</label>
  <checkbox id="neonwolf-pref-autorefresh"
            label="Automatically refresh filter lists in the background"/>
  <hbox align="center" class="neonwolf-settings-row">
    <button id="neonwolf-pref-refresh-now" label="Refresh lists now"/>
    <label id="neonwolf-pref-lastrefresh" class="neonwolf-settings-dim"/>
  </hbox>

  <label class="neonwolf-settings-heading">Updates</label>
  <checkbox id="neonwolf-pref-updatecheck"
            label="Check for new Neonwolf versions"/>
  <description class="neonwolf-settings-dim">Neonwolf only notifies you of new versions and links to the download; it never updates itself automatically.</description>
</groupbox>

<hbox class="subcategory" hidden="true" data-category="paneLibrewolf" style="margin-top: 25px">
    <html:h1 data-l10n-id="neonwolf-pwmgr-header"/>
</hbox>

<groupbox data-category="paneLibrewolf" hidden="true">
  <description class="neonwolf-pwmgr-description" data-l10n-id="neonwolf-pwmgr-description"/>
  <vbox align="start" class="neonwolf-pwmgr-list">
    <label is="text-link" class="neonwolf-pwmgr-link" href="https://bitwarden.com/" data-l10n-id="neonwolf-pwmgr-bitwarden"/>
    <label is="text-link" class="neonwolf-pwmgr-link" href="https://1password.com/" data-l10n-id="neonwolf-pwmgr-1password"/>
    <label is="text-link" class="neonwolf-pwmgr-link" href="https://proton.me/pass" data-l10n-id="neonwolf-pwmgr-protonpass"/>
    <label is="text-link" class="neonwolf-pwmgr-link" href="https://keepassxc.org/" data-l10n-id="neonwolf-pwmgr-keepassxc"/>
  </vbox>
</groupbox>

<hbox class="subcategory" hidden="true" data-category="paneLibrewolf" style="margin-top: 25px">
    <html:h1 data-l10n-id="librewolf-footer"/>
</hbox>

<groupbox data-category="paneLibrewolf" hidden="true">
  <vbox align="start">
    <hbox>
      <button id="librewolf-config-link" is="highlightable-button" flex="1">
        <image class="librewolf-button-icon" src="chrome://browser/skin/preferences/category-general.svg" />
        <label data-l10n-id="librewolf-config-link"></label>
      </button>
      <button id="librewolf-open-profile" is="highlightable-button" flex="1">
        <image class="librewolf-button-icon" src="chrome://browser/skin/open.svg" />
        <label data-l10n-id="librewolf-open-profile"></label>
      </button>
    </hbox>
  </vbox>
</groupbox>

</html:template>
