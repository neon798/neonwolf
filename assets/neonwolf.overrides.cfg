// === Neonwolf overrides (appended on top of upstream librewolf.cfg) ===
//
// Only Neonwolf-specific deltas belong here. The privacy/hardening baseline
// comes from the LibreWolf settings submodule and updates automatically when
// the submodule is bumped — do NOT copy the LibreWolf baseline into this file.
//
// NOTE: upstream patches reference librewolf.* pref names (e.g.
// librewolf.services.settings.allowedCollections), so those are intentionally
// left untouched here; renaming them would break the upstream patch set.

// --- Branding / support URLs ---
defaultPref("app.support.baseURL", "https://github.com/neon798/neonwolf/");
defaultPref("app.releaseNotesURL", "https://github.com/neon798/neonwolf/releases/");
defaultPref("app.releaseNotesURL.aboutDialog", "https://github.com/neon798/neonwolf/releases/");

// --- In-app update notifier (notify-only; the updater stays compiled out) ---
// NeonwolfUpdateCheck.sys.mjs checks the GitHub Releases API ~daily for a newer
// build and, if found, sets neonwolf.update.availableVersion/.url for the UI to
// surface (banner + download link). It NEVER downloads or applies anything.
// Gated by checkEnabled; one HTTPS request to api.github.com on a long interval.
// neonwolf.version.full ("<version>-<release>") is baked at build by
// scripts/neonwolf-patches.py for the version comparison.
defaultPref("neonwolf.update.checkEnabled", true);
defaultPref("neonwolf.update.availableVersion", "");
defaultPref("neonwolf.update.url", "");
defaultPref("neonwolf.update.dismissedVersion", "");

// --- Native ad/tracker blocking (content-classifier engine, no extension) ---
// Filter lists ship as a bundled RemoteSettings dump generated at build time
// (scripts/gen-adblock-dump.py -> main/content-classifier-lists). Allow the
// collection FROM THE DUMP ONLY: adding it to allowedCollections would trigger
// a network sync that deletes the dump-loaded lists. Append rather than clobber
// the LibreWolf baseline (getPref reads the default branch set by librewolf.cfg).
defaultPref(
  "librewolf.services.settings.allowedCollectionsFromDump",
  getPref("librewolf.services.settings.allowedCollectionsFromDump") +
    ",main/content-classifier-lists"
);
defaultPref("privacy.trackingprotection.content.protection.enabled", true);
defaultPref(
  "privacy.trackingprotection.content.protection.list_names",
  "easylist,easyprivacy,peterlowe,ubo-filters,ubo-badware,ubo-privacy,ubo-quickfixes,adguard-mobile,adguard-base,adguard-tracking"
);

// Live filter-list refresh (UBONetFilter): periodically re-fetch the lists from
// their canonical hosts and rebuild the engine in place, bypassing RemoteSettings
// sync so the dump-only delete hazard can't fire. The bundled dump stays the
// offline initial state + per-list fallback (a failed fetch never drops a list).
// This is a phone-home to the list hosts on a slow interval; user-controllable.
// refreshNow is a one-shot trigger for the UI button; lastRefresh (epoch s) is
// surfaced in the UI.
defaultPref("neonwolf.shields.lists.autoRefresh", true);
defaultPref("neonwolf.shields.lists.refreshIntervalHours", 24);
defaultPref("neonwolf.shields.lists.refreshNow", false);
defaultPref("neonwolf.shields.lists.lastRefresh", 0);
// Custom-filters page: user-added filter-list subscription URLs (newline-sep).
defaultPref("neonwolf.shields.lists.subscriptions", "");

// --- Neonwolf Shields ---
// The Shields panel keeps no shadow prefs: its category toggles map directly
// onto the real enforcement prefs — privacy.trackingprotection.ubo.{network,
// cosmetic}.enabled, privacy.trackingprotection.enabled,
// privacy.resistFingerprinting, network.cookie.cookieBehavior, and
// dom.security.https_only_mode (see neonwolf-shields-panel.js). The per-site
// master toggle is a "neonwolf-shields" permission, not a pref.

// --- Credential management: remove, don't manage ---
// Neonwolf ships no built-in credential store. The password manager itself is
// hard-disabled via the PasswordManagerEnabled:false enterprise policy (see
// assets/neonwolf.policies.json) — that locks signon.* and blocks about:logins.
// NOTE: the policy only *disables* (greys out) the Passwords section in
// about:preferences#privacy; the librewolf.hidePasswdmgr pref below actually
// removes it. There is no enterprise policy for form autofill, so lock those
// prefs here. Setting the *.supported gate to "off" disables the engine AND
// hides the "Forms and Autofill" section. Users are pointed at a dedicated
// manager via the Neonwolf preferences pane.
lockPref("extensions.formautofill.addresses.enabled", false);
lockPref("extensions.formautofill.creditCards.enabled", false);
lockPref("extensions.formautofill.addresses.supported", "off");
lockPref("extensions.formautofill.creditCards.supported", "off");
lockPref("extensions.formautofill.creditCards.available", "off");
lockPref("signon.formlessCapture.enabled", false);
// Hide the (now policy-disabled) Passwords UI: LibreWolf's hide-passwordmgr
// patch removes the legacy #passwordsGroup and the app-menu passwords button
// when this is set. The redesigned setting-group is hidden separately by
// patches/neonwolf-hide-passwords-redesign.patch.
defaultPref("librewolf.hidePasswdmgr", true);

// --- DNS-over-HTTPS (Mullvad base, TRR-only, user-changeable) ---
// Override LibreWolf's mode=5 (off) with TRR-only (no plain-DNS fallback).
// All prefs use defaultPref so the user can override in about:config.
defaultPref("network.trr.mode", 3);
defaultPref("network.trr.uri", "https://base.dns.mullvad.net/dns-query");
defaultPref("network.trr.default_provider_uri", "https://base.dns.mullvad.net/dns-query");
defaultPref("network.trr.wait-for-portal", true);
defaultPref("network.trr.skip-address-validation", true);

// --- Max-security permission defaults (user can override in about:config) ---
defaultPref("permissions.default.geo", 2);                 // block
defaultPref("permissions.default.camera", 2);               // block
defaultPref("permissions.default.microphone", 2);           // block
defaultPref("permissions.default.desktop-notification", 2); // block

// --- Extra privacy hardening ---
defaultPref("privacy.spoof_english", 2);                         // spoof Accept-Language to en-US
defaultPref("browser.urlbar.suggest.mdn", false);                // stop MDN-suggestion queries
defaultPref("browser.send_pings", false);                        // disable <a ping> click tracking
defaultPref("network.http.referer.defaultPolicy", 0);            // send no referer at all
defaultPref("privacy.clearOnShutdown_v2.cookiesAndStorage", true); // actually clear cookies on shutdown
defaultPref("dom.security.mixed_content.block_active_content", true); // belt-and-suspenders with HTTPS-only
defaultPref("webgl.disabled", false);                            // re-enabled so FPP farbles it (+WebGLRandomization); WebGL-OFF is itself a conspicuous tell (see FPP section below)
// LibreWolf's webgl-permission.patch ALSO gates content WebGL behind a per-site
// "webgl" permission (librewolf.webgl.prompt, compiled default true) and ships
// with the doorhanger hidden (prompt.hide=true) — i.e. WebGL is SILENTLY DENIED
// everywhere, which is the exact same tell as webgl.disabled. Under the
// FPP-forward posture WebGL must actually run so +WebGLRandomization can farble
// it (empirically verified: context creation fails until this is off).
defaultPref("librewolf.webgl.prompt", false);
defaultPref("device.sensors.enabled", false);                    // device-motion/orientation, fingerprint surface, no desktop use
defaultPref("dom.battery.enabled", false);                       // battery-status API, fingerprint surface
defaultPref("dom.gamepad.enabled", false);                       // gamepad API, fingerprint surface
defaultPref("dom.netinfo.enabled", false);                       // Network Information API, fingerprint surface
defaultPref("media.peerconnection.ice.no_host", true);           // prevent local-IP leak via WebRTC (still allows STUN/TURN relay)

// --- Anti-fingerprinting: FPP-forward farbling (supersedes RFP) ---
// Neonwolf presents a CONVINCING, common fingerprint via per-origin farbling,
// not RFP's uniform "hardened" spoof that stands out. Firefox's three FP modes
// (resistFingerprinting / fingerprintingProtection / baseline...) are MUTUALLY
// EXCLUSIVE and priority-ordered: RFP, when on, shadows FPP entirely. So we turn
// RFP OFF and drive FPP, which gives DETERMINISTIC per-origin canvas/WebGL noise
// (Brave-style, un-averageable) instead of RFP's per-read randomization.
//
// This also unlocks DARK MODE: RFP forces prefers-color-scheme=light
// (CSSPrefersColorScheme target). FPP's default set omits it, so websites see the
// real (dark) scheme and Firefox's native "Website appearance" setting works.
//
// FPP's default set is only 7 targets; `.overrides` (+Name/-Name) adds coverage.
// Only Canvas/EfficientCanvas/WebGL truly randomize per-origin; the rest are
// uniform spoofs. We add WebGL randomization, re-home the fork's hw-concurrency
// pin (rfp-pin-hardware-concurrency.patch -> +NavigatorHWConcurrency, verified
// -> 4), and add audio/font/timer protection. UA/screen-geometry uniform spoofs
// are deliberately NOT added (real-for-platform is more "common" than a faked
// hardened value). TIMEZONE is intentionally left REAL: verified that the JS
// timezone override is gated on the resistFingerprinting *pref* (not the
// JSDateTimeUTC target), so it can't be re-homed onto FPP by override — and a
// spoofed timezone that mismatches IP/locale is itself a tell, so coherent real
// timezone is the more "convincing" choice. This set is a starting point —
// tuned against browserleaks/coveryourtracks.
defaultPref("privacy.resistFingerprinting", false);
defaultPref("privacy.fingerprintingProtection", true);
defaultPref("privacy.fingerprintingProtection.remoteOverrides.enabled", false); // Mozilla can't relax the posture per-site
defaultPref(
  "privacy.fingerprintingProtection.overrides",
  "+WebGLRandomization,+WebGLRenderInfo,+NavigatorHWConcurrency,+AudioContext,+AudioSampleRate,+FontVisibilityBaseSystem,+ReduceTimerPrecision"
);
defaultPref("layout.css.prefers-color-scheme.content-override", 2); // 2 = auto/follow-theme; guard so dark mode follows the synthwave chrome

// Neonwolf: the native content-classifier ad/tracker blocker is only invoked
// via the deferred-annotation channel path; without this it never runs network
// blocking. Required for native ClassifyForCancel to execute.
defaultPref("privacy.trackingprotection.defer_annotation_enabled", true);

// Neonwolf: uBlock Origin's real network engine (UBONetFilter.sys.mjs,
// "powered by uBlock") is authoritative for ad/tracker network blocking. The
// content-classifier's own network cancel stays compiled in as a dormant
// fallback but is disabled; its cosmetic/scriptlet duties are unaffected.
defaultPref("privacy.trackingprotection.content.network_cancel.enabled", false);

// Neonwolf uBO-M2: serve cosmetic + scriptlet filtering from uBlock Origin's
// real engine (UBOCosmeticFilter, "powered by uBlock") through the
// CosmeticFilter actor. The adblock-rust cosmetic path stays as a pref-gated
// fallback (set false to revert to it).
defaultPref("privacy.trackingprotection.ubo.cosmetic.enabled", true);

// uBO's own scriptlet assembler is available but stays OFF by default: its
// per-navigation payload can lose the document_start race on a cold cache
// (task: sharedData sync injection). The default scriptlet payload uses the
// SAME uBO scriptlet code assembled by the proven fast path, which reliably
// wins that race, so ad-blocking quality is identical. Flip to true once
// synchronous injection lands.
defaultPref("privacy.trackingprotection.ubo.scriptlet.enabled", false);
