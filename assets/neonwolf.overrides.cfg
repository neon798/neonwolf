// === Neonwolf overrides (appended on top of upstream librewolf.cfg) ===
//
// Only Neonwolf-specific deltas belong here. The privacy/hardening baseline
// comes from the LibreWolf settings submodule and updates automatically when
// the submodule is bumped — do NOT copy the LibreWolf baseline into this file.
//
// NOTE: upstream patches reference librewolf.* pref names (e.g.
// librewolf.services.settings.allowedCollections), so those are intentionally
// left untouched here; renaming them would break the upstream patch set.

// --- Branding / support URLs ---
defaultPref("app.support.baseURL", "https://github.com/neon798/neonwolf/");
defaultPref("app.releaseNotesURL", "https://github.com/neon798/neonwolf/releases/");
defaultPref("app.releaseNotesURL.aboutDialog", "https://github.com/neon798/neonwolf/releases/");

// --- Neonwolf Shields (panel UI deferred; default prefs reserved so the
//     stub panel and future wiring have stable keys to read/write) ---
defaultPref("neonwolf.shields.enabled", true);
defaultPref("neonwolf.shields.ads", true);
defaultPref("neonwolf.shields.trackers", true);
defaultPref("neonwolf.shields.fingerprinting", true);
defaultPref("neonwolf.shields.cookies", true);
defaultPref("neonwolf.shields.httpsUpgrade", true);
