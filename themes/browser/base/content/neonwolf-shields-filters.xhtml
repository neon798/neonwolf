<?xml-stylesheet href="chrome://global/skin/global.css" type="text/css"?>
<?xml-stylesheet href="chrome://browser/content/neonwolf-shields.css" type="text/css"?>

<window xmlns="http://www.mozilla.org/keymaster/gatekeeper/there.is.only.xul"
        xmlns:html="http://www.w3.org/1999/xhtml"
        id="neonwolf-shields-filters-window"
        windowtype="neonwolf:shields-filters"
        title="Neonwolf Custom Filters"
        width="800"
        height="600">

  <script src="chrome://browser/content/neonwolf-shields-filters.js"/>

  <vbox id="neonwolf-filters-root" class="neonwolf-filters" flex="1">
    <vbox id="neonwolf-filters-header" class="neonwolf-filters-header">
      <label class="neonwolf-filters-title" value="Neonwolf Custom Filters"/>
      <label class="neonwolf-filters-subtitle"
             value="User-defined uBO filter rules"/>
    </vbox>

    <hbox id="neonwolf-filters-toolbar" class="neonwolf-filters-toolbar" align="center">
      <button id="neonwolf-filters-save" class="neonwolf-filters-btn" label="Save"/>
      <button id="neonwolf-filters-revert" class="neonwolf-filters-btn" label="Revert"/>
      <label id="neonwolf-filters-counter" class="neonwolf-filters-counter"
             value="0 rules, 0 comments"/>
      <spacer flex="1"/>
      <label id="neonwolf-filters-unsaved" class="neonwolf-filters-unsaved" hidden="true"
             value="unsaved changes"/>
      <label id="neonwolf-filters-lint" class="neonwolf-filters-lint"/>
      <label id="neonwolf-filters-status" class="neonwolf-filters-status"/>
    </hbox>

    <vbox id="neonwolf-filters-editor-wrap" class="neonwolf-filters-editor-wrap" flex="1">
      <html:textarea id="neonwolf-filters-editor"
                     class="neonwolf-filters-editor"
                     placeholder="||ads.example.com^&#10;example.com##.banner"/>
    </vbox>
  </vbox>
</window>
