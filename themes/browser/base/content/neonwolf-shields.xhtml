<panel id="neonwolf-shields-panel" type="arrow" orient="vertical" role="group"
       shields-available="false">

  <vbox id="neonwolf-shields-header" class="shields-header">
    <hbox align="center">
      <image id="neonwolf-shields-icon" class="neonwolf-shields-icon"/>
      <label id="neonwolf-shields-host" class="neonwolf-shields-host shields-header-label"/>
    </hbox>
    <label id="neonwolf-shields-status" class="neonwolf-shields-status"/>
  </vbox>

  <vbox id="neonwolf-shields-master-row" class="shields-toggle-row">
    <checkbox id="neonwolf-shields-master"
              label="Shields UP for this site"/>
    <description id="neonwolf-shields-master-hint" class="shields-toggle-label">
      Turn off to allow ads and trackers on this site only.
    </description>
  </vbox>

  <vbox id="neonwolf-shields-controls">
    <label class="shields-stat-label" value="Default protections"/>

    <checkbox id="neonwolf-shields-ads"
              class="shields-toggle-row"
              label="Block ads"/>

    <checkbox id="neonwolf-shields-trackers"
              class="shields-toggle-row"
              label="Block trackers"/>

    <checkbox id="neonwolf-shields-fingerprinting"
              class="shields-toggle-row"
              label="Block fingerprinting"/>

    <checkbox id="neonwolf-shields-cookies"
              class="shields-toggle-row"
              label="Block cross-site cookies"/>

    <checkbox id="neonwolf-shields-httpsUpgrade"
              class="shields-toggle-row"
              label="Upgrade connections to HTTPS"/>
  </vbox>

  <vbox id="neonwolf-shields-footer" class="shields-footer">
    <hbox align="center">
      <label class="shields-footer-label" value="Blocked on this page:"/>
      <label id="neonwolf-shields-count" class="shields-count-badge"/>
    </hbox>
  </vbox>
</panel>
